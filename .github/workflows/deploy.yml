# Deploys via SSH after you add repository secrets (see below).
# Runs automatically after the "Tests" workflow succeeds on a push to `master`, or manually:
#   Actions → "Deploy to production" → Run workflow.
#
# Required secrets (Settings → Secrets and variables → Actions):
#   DEPLOY_HOST     — server hostname or IP
#   DEPLOY_USER     — SSH user (e.g. deploy, ubuntu, forge)
#   DEPLOY_SSH_KEY  — private key (full PEM, including BEGIN/END lines)
#   DEPLOY_PATH     — absolute path to Laravel root on server (e.g. /home/forge/swaeduae.ae)
#
name: Deploy to production

on:
  workflow_dispatch:
  workflow_run:
    workflows: [Tests]
    types: [completed]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'master' &&
       github.event.workflow_run.event == 'push')

    steps:
      - name: Checkout (for deploy script reference)
        uses: actions/checkout@v4

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch origin
            git checkout master
            git pull origin master
            chmod +x scripts/deploy-on-server.sh || true
            ./scripts/deploy-on-server.sh
